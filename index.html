<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 수면 장소 찾기</title>
    <style>
        /* 기본 여백 제거 및 폰트 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }
        
        /* 전체 화면을 Flexbox를 이용해 좌우 2분할 */
        #container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* 왼쪽 사이드바 (탭 + 검색창 + 리스트) */
        #sidebar {
            width: 400px;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 2; /* 지도보다 위에 표시 */
        }

        /* 탭 메뉴 스타일 */
        #tabs {
            display: flex;
            flex-wrap: wrap;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            background-color: #fff;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background-color: #f1f1f1;
        }

        .tab-btn.active {
            color: #000;
            border-bottom: 3px solid #ffe812; /* 카카오 옐로우 */
        }

        /* 검색 영역 스타일 (탭 기능으로 대체할 수도 있지만 일단 유지) */
        #search-box {
            padding: 15px;
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        #keyword {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #search-btn {
            padding: 8px 15px;
            background-color: #ffe812;
            border: 1px solid #d4c000;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 검색 결과 리스트 스타일 */
        #places-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        #places-list li {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        #places-list li:hover {
            background-color: #e9ecef;
        }

        #places-list li h5 {
            margin-bottom: 5px;
            color: #333;
            font-size: 16px;
        }

        #places-list li p {
            font-size: 13px;
            color: #777;
            margin-bottom: 3px;
        }

        .distance-info {
            color: #007bff !important;
            font-weight: bold;
        }

        /* 오른쪽 지도 영역 */
        #map-wrapper {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* 내 위치 커스텀 오버레이 스타일 (파란 점) */
        .my-location-dot {
            width: 16px;
            height: 16px;
            background-color: #007bff;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        /* 팝업 길찾기 버튼 */
        .route-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 10px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="sidebar">
            <div id="tabs">
                <button class="tab-btn active" onclick="changeTab('도서관', this)">도서관</button>
                <button class="tab-btn" onclick="changeTab('만화카페', this)">만화카페</button>
                <button class="tab-btn" onclick="changeTab('찜질방', this)">찜질방</button>
                <button class="tab-btn" onclick="changeTab('카페', this)">카페</button>
                <button class="tab-btn" onclick="changeTab('노래방', this)">노래방</button>
            </div>

            <div id="search-box">
                <input type="text" id="keyword" placeholder="직접 검색어 입력" onkeypress="if(event.keyCode==13) { customSearch(); }">
                <button id="search-btn" onclick="customSearch()">검색</button>
            </div>
            
            <ul id="places-list"></ul>
        </div>

        <div id="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=e57825b9ee14bd78fc0b425ebdf9f8dc&libraries=services&autoload=false"></script>
    
    <script>
        // 전역 변수 선언 (Global variables)
        let map; 
        let markers = []; 
        let ps; 
        let infowindow;
        let currentLat, currentLng; // 현재 위치 좌표 저장용
        let currentCategory = '도서관'; // 초기 탭 설정

        // 1. 현재 위치 가져오기 및 지도 초기화
        function initGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    currentLat = position.coords.latitude; 
                    currentLng = position.coords.longitude; 
                    loadMap(currentLat, currentLng);
                }, function(error) {
                    alert("위치 권한을 허용하지 않아 기본 위치(서울시청)로 지도를 엽니다.");
                    currentLat = 37.566826;
                    currentLng = 126.9786567;
                    loadMap(currentLat, currentLng);
                });
            } else {
                alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
                currentLat = 37.566826;
                currentLng = 126.9786567;
                loadMap(currentLat, currentLng);
            }
        }

        // 2. 카카오맵 로드 및 렌더링
        function loadMap(lat, lng) {
            kakao.maps.load(function() {
                const mapContainer = document.getElementById('map'); 
                const mapOption = {
                    center: new kakao.maps.LatLng(lat, lng),
                    level: 5 
                };

                map = new kakao.maps.Map(mapContainer, mapOption);
                ps = new kakao.maps.services.Places();
                infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

                // 내 위치 파란 점(CustomOverlay) 표시
                const myLocationContent = '<div class="my-location-dot"></div>';
                const myLocationOverlay = new kakao.maps.CustomOverlay({
                    position: new kakao.maps.LatLng(lat, lng),
                    content: myLocationContent,
                    map: map
                });

                // 초기 카테고리로 검색 시작
                searchPlaces(currentCategory);
            });
        }

        // 3. 탭 클릭 시 카테고리 변경 함수
        function changeTab(category, btnElement) {
            currentCategory = category;
            
            // 모든 탭 버튼의 active 클래스 제거 후 클릭된 버튼만 추가
            const tabButtons = document.querySelectorAll('.tab-btn');
            tabButtons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // 검색창 텍스트 초기화 및 해당 카테고리 검색 실행
            document.getElementById('keyword').value = '';
            searchPlaces(currentCategory);
        }

        // 3-1. 직접 검색창 입력 시 실행 함수
        function customSearch() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('검색어를 입력해주세요!');
                return false;
            }
            
            // 탭 활성화 상태 초기화
            const tabButtons = document.querySelectorAll('.tab-btn');
            tabButtons.forEach(btn => btn.classList.remove('active'));
            
            currentCategory = keyword; // 검색용 카테고리를 직접 입력한 키워드로 대체
            searchPlaces(keyword);
        }

        // 4. 키워드로 장소 검색하기
        function searchPlaces(keyword) {
            // 내 위치 기준으로 검색 반경 및 거리 정렬 옵션 설정
            const searchOptions = {
                location: new kakao.maps.LatLng(currentLat, currentLng), 
                radius: 3000, // 3km 이내
                sort: kakao.maps.services.SortBy.DISTANCE // 거리순 정렬
            };

            ps.keywordSearch(keyword, placesSearchCB, searchOptions); 
        }

        // 5. 검색 완료 콜백 함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data); 
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                // 검색 결과가 없으면 리스트와 마커 지우기
                document.getElementById('places-list').innerHTML = '<li style="text-align:center;">검색 결과가 존재하지 않습니다.</li>';
                removeMarkers();
                infowindow.close();
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 6. 카테고리별 마커 아이콘 색상을 반환하는 함수 (SVG 데이터)
        function getMarkerIconUrl(category) {
            let color = "%23333333"; // 기본 검정
            if (category === "도서관") color = "%234CAF50"; // 초록
            else if (category === "만화카페") color = "%23FF9800"; // 주황
            else if (category === "찜질방") color = "%239C27B0"; // 보라
            else if (category === "카페") color = "%23795548"; // 갈색
            else if (category === "노래방") color = "%23E91E63"; // 핑크

            // 핀 모양의 SVG 마커 생성
            return `data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40"><path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 26 14 26s14-15.5 14-26c0-7.732-6.268-14-14-14z" fill="${color}"/><circle cx="14" cy="14" r="6" fill="%23ffffff"/></svg>`;
        }

        // 7. 검색 결과를 리스트와 지도에 표시
        function displayPlaces(places) {
            const listEl = document.getElementById('places-list');
            const bounds = new kakao.maps.LatLngBounds(); 
            
            // 내 위치도 범위에 포함하여 지도가 축소될 때 내 위치가 보이도록 함
            bounds.extend(new kakao.maps.LatLng(currentLat, currentLng));

            listEl.innerHTML = '';
            removeMarkers();
            infowindow.close();

            // 현재 선택된 탭(카테고리)에 따른 마커 이미지 설정
            const markerImageUrl = getMarkerIconUrl(currentCategory);
            const markerImageSize = new kakao.maps.Size(28, 40);
            const markerImage = new kakao.maps.MarkerImage(markerImageUrl, markerImageSize, {offset: new kakao.maps.Point(14, 40)});

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 장소까지의 거리 (미터 단위)
                const distanceInfo = places[i].distance ? parseInt(places[i].distance) + 'm' : '거리 정보 없음';

                const markerOptions = {
                    position: placePosition,
                    map: map,
                    image: markerImage
                };

                const marker = new kakao.maps.Marker(markerOptions);
                markers.push(marker);
                bounds.extend(placePosition);

                // 길찾기 링크 생성 (카카오맵 웹 길찾기로 연결)
                const routeUrl = `https://map.kakao.com/link/to/${places[i].place_name},${places[i].y},${places[i].x}`;

                // 팝업 컨텐츠 구성 (이름, 주소, 거리, 영업시간, 길찾기 버튼)
                const popupContent = `
                    <div style="padding:15px; font-size:13px; min-width:200px; line-height: 1.5; box-sizing: border-box;">
                        <strong style="display:block; font-size:15px; margin-bottom:5px;">${places[i].place_name}</strong>
                        <span style="color:#666; display:block;">${places[i].road_address_name || places[i].address_name}</span>
                        <span style="color:#007bff; display:block; font-weight:bold; margin-top:3px;">📍 내 위치에서 ${distanceInfo}</span>
                        <span style="color:#28a745; display:block; font-size:12px; margin-top:3px;">⏰ 영업시간: 확인필요 (API 미제공)</span>
                        <a href="${routeUrl}" target="_blank" class="route-btn">도보/대중교통 길찾기 🚶</a>
                    </div>
                `;

                // 마커 클릭 이벤트 설정
                kakao.maps.event.addListener(marker, 'click', function() {
                    infowindow.setContent(popupContent);
                    infowindow.open(map, marker);
                });

                // 리스트 아이템 HTML 구성
                const li = document.createElement('li');
                li.innerHTML = `
                    <h5>${places[i].place_name}</h5>
                    <p>${places[i].road_address_name || places[i].address_name}</p>
                    <p class="distance-info">📍 내 위치에서 ${distanceInfo}</p>
                    <p style="color: #28a745; font-size: 12px; margin-top: 3px;">⏰ 영업시간: 09:00 ~ 22:00 (예시)</p>
                `;
                
                // 리스트 클릭 이벤트 설정
                li.onclick = function() {
                    map.setCenter(placePosition);
                    infowindow.setContent(popupContent);
                    infowindow.open(map, marker);
                };

                listEl.appendChild(li);
            }

            // 검색된 마커들과 내 위치가 모두 보이도록 지도 범위 재설정
            map.setBounds(bounds);
        }

        // 8. 기존 마커들 모두 제거
        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];
        }

        // 페이지 로드 완료 시 실행
        window.onload = initGeolocation;
    </script>
</body>
</html>
